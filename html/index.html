
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bloom Agenda</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="../css/style.css" />

    <!-- PWA -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#ff6b9d" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(
          135deg,
          #ffb6c1 0%,
          #ffdac1 50%,
          #ffe4e1 100%
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .login-container {
        background: rgba(255, 255, 255, 0.95);
        padding: 3rem 2.5rem;
        border-radius: 24px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        width: 100%;
        max-width: 420px;
        text-align: center;
      }

      .logo {
        font-size: 3rem;
        margin-bottom: 0.5rem;
        color: #ff6b9d;
      }

      h2 {
        color: #333;
        margin-bottom: 0.5rem;
        font-weight: 600;
      }

      .subtitle {
        color: #666;
        margin-bottom: 2rem;
      }

      .input-group {
        position: relative;
        margin-bottom: 1.5rem;
      }

      input {
        width: 100%;
        padding: 1rem 1rem 1rem 3rem;
        border: 2px solid #e8e8e8;
        border-radius: 16px;
        font-size: 1rem;
      }

      input:focus {
        outline: none;
        border-color: #ff6b9d;
      }

      .input-group i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #999;
      }

      .login-btn {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #ff6b9d, #c44569);
        color: white;
        border: none;
        border-radius: 16px;
        font-size: 1rem;
        cursor: pointer;
      }

      .login-btn:hover {
        opacity: 0.9;
      }

      .links {
        margin-top: 1.5rem;
        font-size: 0.95rem;
      }

      .links a {
        color: #ff6b9d;
        text-decoration: none;
        font-weight: 500;
      }

      .links a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <div class="logo">
        <i class="fas fa-calendar-alt"></i>
      </div>

      <h2>Bloom Agenda</h2>

      <p class="subtitle">
        Bem-vindo de volta! Faça login para acessar sua agenda.
      </p>

      <form id="loginForm">
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="username" placeholder="Email" required />
        </div>

        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input
            type="password"
            id="password"
            placeholder="Senha"
            required
          />
        </div>

        <button type="submit" class="login-btn">
          <i class="fas fa-sign-in-alt"></i>
          Entrar
        </button>
      </form>
        <a href="cadastro.html">
          <i class="fas fa-user-plus"></i>
          Cadastre-se
        </a>
      </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/pwa.js"></script>
    <script>
      // Já autenticado? Vai direto para a home.
      if (BloomAPI.isAuthenticated()) window.location.href = "home.html";

      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("username").value.trim();
        const senha = document.getElementById("password").value;

        try {
          const data = await BloomAPI.auth.login({ email, senha });
          BloomAPI.setToken(data.token);
          BloomAPI.setUser(data.user);
          window.location.href = "home.html";
        } catch (error) {
          alert(error.message || "Erro ao conectar com o servidor");
        }
      });
    </script>
  </body>
</html>
