doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bloom Agenda</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css"/>
  </head>
  <body>
    <div class="container">
      <div class="main-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="text-center flex-grow-1 mb-0">🌸 Bloom Agenda</h2>
          <button class="btn logout-btn btn-sm" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i>
          </button>
        </div>

        <input
          type="text"
          id="calendario"
          class="form-control mb-3"
          placeholder="Data opcional"
        />

        <div class="row mb-4 form-row">
          <div class="col-md">
            <select id="diaSemana" class="form-select">
              <option value="segunda">Segunda-feira</option>
              <option value="terca">Terça-feira</option>
              <option value="quarta">Quarta-feira</option>
              <option value="quinta">Quinta-feira</option>
              <option value="sexta">Sexta-feira</option>
              <option value="sabado">Sábado</option>
              <option value="domingo">Domingo</option>
            </select>
          </div>
          <div class="col-md">
            <input type="time" id="horario" class="form-control" />
          </div>
          <div class="col-md">
            <input
              type="text"
              id="tarefa"
              class="form-control"
              placeholder="Digite a tarefa..."
            />
          </div>
          <div class="col-md-auto">
            <button id="btnAdicionar" class="btn w-100 h-100">
              + Adicionar
            </button>
          </div>
        </div>

        <div id="dias">
          <div class="day-section">
            <h5>Segunda-feira</h5>
            <div id="segunda"></div>
          </div>
          <div class="day-section">
            <h5>Terça-feira</h5>
            <div id="terca"></div>
          </div>
          <div class="day-section">
            <h5>Quarta-feira</h5>
            <div id="quarta"></div>
          </div>
          <div class="day-section">
            <h5>Quinta-feira</h5>
            <div id="quinta"></div>
          </div>
          <div class="day-section">
            <h5>Sexta-feira</h5>
            <div id="sexta"></div>
          </div>
          <div class="day-section">
            <h5>Sábado</h5>
            <div id="sabado"></div>
          </div>
          <div class="day-section">
            <h5>Domingo</h5>
            <div id="domingo"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    
    <script>
    </script>
  </body>
</html>
